<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">School BCBA FBA and BIP request bottleneck</title>
  <desc id="desc">A branded visual showing school behavior support requests moving through a tiered system.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#064E3B"/>
      <stop offset="0.55" stop-color="#0F766E"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#ECFDF5" stop-opacity="0.92"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#022C22" flood-opacity="0.24"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <g opacity="0.2" fill="none" stroke="#D1FAE5" stroke-width="2">
    <path d="M0 130 C180 80 320 190 500 130 S850 70 1200 145"/>
    <path d="M0 520 C160 455 350 585 560 520 S900 450 1200 545"/>
    <path d="M120 0 L640 675"/>
    <path d="M520 0 L1040 675"/>
  </g>
  <g transform="translate(88 86)">
    <text x="0" y="0" fill="#D1FAE5" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800" letter-spacing="2">SCHOOL BCBA SYSTEMS</text>
    <text x="0" y="68" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="62" font-weight="900">FBA/BIP Requests</text>
    <text x="0" y="126" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="62" font-weight="900">Need a System</text>
    <text x="0" y="174" fill="#D1FAE5" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="600">Not a bigger paperwork queue.</text>
  </g>
  <g transform="translate(90 332)" filter="url(#shadow)">
    <rect x="0" y="0" width="270" height="180" rx="18" fill="url(#card)"/>
    <text x="32" y="48" fill="#064E3B" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900">Teacher Concern</text>
    <text x="32" y="88" fill="#0F766E" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">define behavior</text>
    <text x="32" y="120" fill="#0F766E" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">check routines</text>
    <text x="32" y="152" fill="#0F766E" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">rapid support cycle</text>
  </g>
  <g transform="translate(465 278)" filter="url(#shadow)">
    <rect x="0" y="0" width="270" height="235" rx="18" fill="url(#card)"/>
    <text x="32" y="50" fill="#064E3B" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900">Tiered Triage</text>
    <circle cx="48" cy="92" r="12" fill="#10B981"/>
    <text x="76" y="99" fill="#0F766E" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Tier 1 routine</text>
    <circle cx="48" cy="132" r="12" fill="#F59E0B"/>
    <text x="76" y="139" fill="#0F766E" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Tier 2 support</text>
    <circle cx="48" cy="172" r="12" fill="#EF4444"/>
    <text x="76" y="179" fill="#0F766E" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Tier 3 FBA/BIP</text>
  </g>
  <g transform="translate(840 332)" filter="url(#shadow)">
    <rect x="0" y="0" width="270" height="180" rx="18" fill="url(#card)"/>
    <text x="32" y="48" fill="#064E3B" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900">BCBA Time</text>
    <text x="32" y="88" fill="#0F766E" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">complex assessment</text>
    <text x="32" y="120" fill="#0F766E" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">coaching fidelity</text>
    <text x="32" y="152" fill="#0F766E" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">systems leadership</text>
  </g>
  <g fill="none" stroke="#A7F3D0" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M370 422 H438"/>
    <path d="M718 422 H816"/>
  </g>
  <g fill="#A7F3D0">
    <path d="M440 422 l-22 -14 v28 z"/>
    <path d="M818 422 l-22 -14 v28 z"/>
  </g>
  <text x="90" y="602" fill="#D1FAE5" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">robspain.com</text>
</svg>
